services:

  web:
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000" ]
      interval: 30s
      timeout: 10s
      retries: 3
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn shortener.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/static
    expose:
      - 8000
    depends_on:
      - redis
    restart: always


  redis:
    image: redis:7


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: always


volumes:
  static_volume: